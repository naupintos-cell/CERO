<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#020802">
<title>Your Heineken × Kairo</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'><polygon points='24,3 28.5,17 43,17 31,26 35.5,40 24,31.5 12.5,40 17,26 5,17 19.5,17' fill='%23C41E1E'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased}
html,body{height:100%;background:#020802;color:#F5F2EB;font-family:'DM Sans',system-ui,sans-serif;overflow-x:hidden}

/* FULL SCREEN HERO */
.hero{
  min-height:100svh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:48px 28px;
  text-align:center;
  position:relative;
}

/* NAV */
.nav{
  position:fixed;top:0;left:0;right:0;
  padding:18px 24px;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(2,8,2,.85);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(245,242,235,.05);
  z-index:100;
}
.nav-left{display:flex;align-items:center;gap:8px}
.nav-star{color:#C41E1E;font-size:11px}
.nav-brand{font-size:.52rem;letter-spacing:3px;text-transform:uppercase;font-weight:500}
.nav-live{display:flex;align-items:center;gap:6px;font-size:.48rem;letter-spacing:2px;text-transform:uppercase;color:#00A846}
.live-dot{width:6px;height:6px;border-radius:50%;background:#00A846;animation:ld 2s ease-in-out infinite}
@keyframes ld{0%,100%{opacity:.35}50%{opacity:1}}

/* CONTENT */
.hero-content{max-width:380px;width:100%}

.kicker{
  font-size:.5rem;letter-spacing:5px;text-transform:uppercase;
  color:rgba(0,168,70,.6);margin-bottom:1.5rem;display:block;
}

/* VIDEO */
.video-wrap{
  width:100%;max-width:260px;margin:0 auto 2rem;
  border-radius:20px;overflow:hidden;
  border:1px solid rgba(0,168,70,.25);
  box-shadow:0 24px 60px rgba(0,0,0,.8),0 0 40px rgba(0,168,70,.1);
}
.video-wrap video{display:block;width:100%}

/* HEADLINE */
.headline{
  font-family:'Cormorant Garamond',Georgia,serif;
  font-size:clamp(2rem,8vw,3.2rem);
  font-weight:300;line-height:1.08;
  letter-spacing:-.01em;
  margin-bottom:.75rem;
}
.headline em{color:#00A846;font-style:italic}

/* SUB */
.sub{
  font-size:.85rem;color:rgba(245,242,235,.38);
  font-weight:300;line-height:1.7;
  margin-bottom:2.5rem;
}

/* CTA */
.cta{
  display:flex;align-items:center;justify-content:center;gap:10px;
  background:#007A33;color:#fff;
  padding:18px 24px;border-radius:2px;
  font-size:.62rem;font-weight:600;letter-spacing:4px;text-transform:uppercase;
  text-decoration:none;width:100%;
  transition:background .2s;
}
.cta:hover{background:#00A846}

.hint{
  margin-top:.75rem;
  font-size:.46rem;letter-spacing:3px;text-transform:uppercase;
  color:rgba(245,242,235,.18);
}

/* BOTTOM CREDIT */
.credit{
  position:absolute;bottom:28px;
  font-size:.46rem;letter-spacing:3px;text-transform:uppercase;
  color:rgba(245,242,235,.15);
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-left">
    <span class="nav-star">★</span>
    <span class="nav-brand">Your Heineken × Kairo</span>
  </div>
  <div class="nav-live">
    <div class="live-dot"></div>
    <span>Live</span>
  </div>
</nav>

<div class="hero">
  <div class="hero-content">

    <span class="kicker">Heineken × Kairo</span>

    <!-- VIDEO -->
    <div class="video-wrap">
      <video autoplay loop muted playsinline>
        <source src="/HEINEKEN.mp4" type="video/mp4">
      </video>
    </div>

    <!-- HEADLINE -->
    <h1 class="headline">
      You know when<br>they buy.<br>
      <em>Not when<br>they drink.</em>
    </h1>

    <!-- SUB -->
    <p class="sub">We built what nobody did.<br>Live it.</p>

    <!-- CTA -->
    <a href="https://heineken-production.up.railway.app" target="_blank" class="cta">
      Live the ritual
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>

    <p class="hint">No download · 60 seconds</p>

  </div>

  <p class="credit">Built by Kairo · kairoinc.lat</p>
</div>

</body>
</html>
